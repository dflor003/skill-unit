name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run-skill-tests:
        description: 'Run skill-unit tests (uses API credits)'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24, 25]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

  skill-tests:
    name: Skill-Unit Tests
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.run-skill-tests == true) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-skill-tests'))
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Verify Node.js
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Install Claude CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.claude/bin" >> "$GITHUB_PATH"

      - name: Verify Claude CLI
        run: claude --version

      - name: Verify Claude Token is present
        run: |
          if [ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN is empty. Check the GitHub secret name matches."
            exit 1
          fi
          echo "Token length: ${#CLAUDE_CODE_OAUTH_TOKEN}"

      - name: Run skill-unit tests
        run: npm run test:skills -- --junit test-results/junit.xml

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Skill-Unit Tests
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: skill-unit-results
          path: .workspace/runs/
          retention-days: 14
          if-no-files-found: ignore
