# .skill-unit.yml
# Place this file at your repo root to configure skill-unit for this project.
# All fields are optional — skill-unit has sensible built-in defaults.

# Directory where test spec files (*.spec.md) are discovered recursively.
test-dir: tests

# Runner configuration — how test prompts are executed in isolated sessions.
# Change this to match your AI agent harness (Claude, Copilot, Codex, etc.).
runner:
  # The CLI executable to invoke for each test prompt.
  command: claude
  # Default arguments passed to the CLI. The prompt is piped via stdin.
  args: ["--print", "--output-format", "text", "--max-turns", "10"]

# Output settings
output:
  # Display format for results. Use "json" for CI/CD pipelines and machine-readable output.
  format: interactive

  # When false, passing tests are collapsed to a single summary line.
  # Set to true to show full expectation details for passing tests as well.
  show-passing-details: false

# Execution settings
execution:
  # Default per-test timeout. Can be overridden per spec file via frontmatter.
  timeout: 60s

# Default setup and teardown scripts. Applied to all spec files that do not
# declare their own setup/teardown in frontmatter.
defaults:
  setup: setup.sh
  teardown: teardown.sh
